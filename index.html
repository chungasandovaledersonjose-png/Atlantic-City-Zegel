<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="bg-main-layout d-flex align-items-center justify-content-center vh-100">

    <div class="login-vertical-card p-4 p-sm-5 text-center">
        <div class="brand-logo-full mb-4">
            <img src="imagenes/logo.png" alt="Atlantic City Sistema de Administración">
        </div>
        <p class="text-muted small mb-4">Por favor, introduce tus credenciales para acceder</p>
        
        <form>
            <div class="mb-3 text-start">
                <label for="email" class="form-label fw-semibold text-secondary small">Usuario</label>
                <div class="input-group custom-input-group">
                    <span class="input-group-text bg-white text-muted border-end-0">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="email" class="form-control border-start-0 ps-0" id="email" placeholder="Usuario" >
                </div>
            </div>

            <div class="mb-4 text-start">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="password" class="form-label fw-semibold text-secondary small mb-0">Contraseña</label>
                </div>
                <div class="input-group custom-input-group">
                    <span class="input-group-text bg-white text-muted border-end-0">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="••••••••">
                </div>
            </div>
            <a href="../html/intro.html" class="btn btn-primary w-100 py-2.5 fw-semibold btn-login mb-3 text-decoration-none">
                Iniciar Sesión </a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
