<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Atlantic City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/index.css" rel="stylesheet">
</head>
<body>

    <!-- Barra superior para móviles -->
    <div class="d-md-none p-3 d-flex justify-content-between align-items-center bg-dark border-bottom">
        <img src="../imagenes/logo.png" alt="Logo" class="img-fluid" style="height: 30px;">
        <button class="btn btn-outline-secondary mobile-menu-btn" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarNavigation" aria-controls="sidebarNavigation" aria-expanded="false" aria-label="Abrir menú de navegación">
            <i class="bi bi-list"></i>
        </button>
    </div>

    <!-- Barra lateral (Sidebar) -->
    <div class="sidebar d-flex flex-column justify-content-between">
        <div class="w-100 h-100 d-flex flex-column">
            <div class="sidebar-header mb-4 d-none d-md-flex align-items-center justify-content-start">
                <div class="sidebar-logo-space rounded d-flex align-items-center justify-content-start px-2">
                    <img src="../imagenes/logo.png" alt="Logo Atlantic City" class="img-fluid sidebar-logo">
                </div>
            </div>

            <div class="collapse d-md-flex flex-md-column justify-content-between h-100" id="sidebarNavigation">
                <nav class="nav flex-column hidden-text-tablet" aria-label="Navegación principal">
                    <a class="nav-link-custom active" href="dashboard.html">
                        <i class="bi bi-speedometer2" aria-hidden="true"></i> <span>Dashboard</span>
                    </a>
                    <a class="nav-link-custom" href="clientes.html">
                        <i class="bi bi-people" aria-hidden="true"></i> <span>Clientes</span>
                    </a>
                    <a class="nav-link-custom" href="membresia.html">
                        <i class="bi bi-card-checklist" aria-hidden="true"></i> <span>Membresías</span>
                    </a>
                    <a class="nav-link-custom" href="sesiones.html">
                        <i class="bi bi-controller" aria-hidden="true"></i> <span>Sesiones de Juego</span>
                    </a>
                    <a class="nav-link-custom" href="promociones.html">
                        <i class="bi bi-tags" aria-hidden="true"></i> <span>Promociones</span>
                    </a>
                    <a class="nav-link-custom" href="quejas.html">
                        <i class="bi bi-exclamation-octagon" aria-hidden="true"></i> <span>Quejas</span>
                    </a>
                    <a class="nav-link-custom" href="usuarios.html">
                        <i class="bi bi-person-gear" aria-hidden="true"></i> <span>Usuarios</span>
                    </a>
                </nav>

                <div class="sidebar-user-wrapper w-100 mt-3">
                    <div class="sidebar-user-space p-3 rounded d-flex align-items-center mobile-user-block">
                        <div class="rounded-circle user-avatar" style="width: 35px; height: 35px; flex-shrink: 0; margin-right: 10px;"></div>
                        <div class="w-100 user-placeholder-line rounded" style="height: 20px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenido Principal -->
    <main class="main-content">
        <div class="d-flex justify-content-end mb-4">
            <button id="themeToggler" class="btn btn-outline-secondary d-flex align-items-center gap-2" aria-live="polite">
                <i id="themeIcon" class="bi bi-sun-fill" aria-hidden="true"></i>
                <span id="themeText">Modo Claro</span>
            </button>
        </div>

        <!-- CONTENIDO ESPECÍFICO DE DASHBOARD -->
        <h2 class="mb-4">Resumen General</h2>
        
        <div class="row g-4 mb-4">
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card p-3 border-secondary bg-transparent">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">Clientes Activos</h6>
                            <h3 class="mb-0">1,245</h3>
                        </div>
                        <i class="bi bi-people text-primary fs-2"></i>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card p-3 border-secondary bg-transparent">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">Sesiones Hoy</h6>
                            <h3 class="mb-0">342</h3>
                        </div>
                        <i class="bi bi-controller text-success fs-2"></i>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card p-3 border-secondary bg-transparent">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">Membresías VIP</h6>
                            <h3 class="mb-0">89</h3>
                        </div>
                        <i class="bi bi-gem text-warning fs-2"></i>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card p-3 border-secondary bg-transparent">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">Quejas Pendientes</h6>
                            <h3 class="mb-0">4</h3>
                        </div>
                        <i class="bi bi-exclamation-octagon text-danger fs-2"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/index.js" defer></script>
</body>
</html>
